services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env

    environment:
      - LITELLM_LOGGING=langfuse
      - LANGFUSE_PUBLIC_KEY=pk-lf-e3fb03a5-8334-4d60-8dd5-8bd1c61011df
      - LANGFUSE_SECRET_KEY=sk-lf-742e3fa1-e787-4373-9a2c-affc401de4e1
      - LANGFUSE_HOST=http://langfuse:3000
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: always

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    restart: always

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=kailash123langfuse
      - SALT=kailash123salt
      - NEXTAUTH_URL=http://13.235.251.45:3001
    restart: always

volumes:
  prometheus_data:
  grafana_data:
